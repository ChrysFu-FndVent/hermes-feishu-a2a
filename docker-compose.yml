services:
  hermes:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HERMES_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
