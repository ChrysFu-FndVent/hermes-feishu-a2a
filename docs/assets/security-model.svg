<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc"><title id="title">Security model</title><desc id="desc">Inbound events pass through signature, chat, and identity gates before a bounded workflow can dispatch to an Agent.</desc><!-- Generated by scripts/render_readme_diagrams.py. --><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a8b5c7"/></marker><marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/></marker><style>.title{font:700 44px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.subtitle{font:400 22px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.eyebrow{font:700 16px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:1.8px}.heading{font:700 26px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.body{font:500 21px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.compact-body{font:500 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.small{font:600 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.pill{font:700 15px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.8px}.line{fill:none;stroke:#a8b5c7;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.line-green{fill:none;stroke:#4ade80;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-green)}.line-red{fill:none;stroke:#fb7185;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-red)}</style></defs><rect width="1600" height="820" rx="28" fill="#0b1220"/><path d="M0 190 H1600" stroke="#2b3b55" stroke-width="1" opacity=".6"/><text x="64" y="70" class="title">Three gates before orchestration</text><text x="64" y="106" class="subtitle">Untrusted Feishu events never become Agent work until every boundary passes.</text><g><rect x="64" y="136" width="174" height="30" rx="15" fill="#17243a" stroke="#fb7185"/><rect x="64" y="136" width="174" height="30" rx="15" fill="#fb7185" opacity=".12"/><text x="151.0" y="157" class="pill" fill="#fb7185" text-anchor="middle">FAIL CLOSED</text></g><g><rect x="250" y="136" width="196" height="30" rx="15" fill="#17243a" stroke="#2dd4bf"/><rect x="250" y="136" width="196" height="30" rx="15" fill="#2dd4bf" opacity=".12"/><text x="348.0" y="157" class="pill" fill="#2dd4bf" text-anchor="middle">IDENTITY EXPLICIT</text></g><g><rect x="458" y="136" width="220" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="458" y="136" width="220" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="568.0" y="157" class="pill" fill="#4ade80" text-anchor="middle">WORKFLOW BOUNDED</text></g><rect x="54" y="286" width="120" height="108" rx="18" fill="#17243a" stroke="#2dd4bf" stroke-width="2"/><circle cx="114" cy="318" r="12" fill="#2dd4bf"/><text x="114" y="355" class="heading" text-anchor="middle">Event</text><text x="114" y="380" class="small" text-anchor="middle">raw bytes</text><g filter="url(#shadow)"><rect x="230" y="235" width="285" height="210" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="230" y="235" width="7" height="210" rx="4" fill="#60a5fa"/><circle cx="264" cy="270" r="8" fill="#60a5fa"/><text x="284" y="275" class="eyebrow" fill="#60a5fa">GATE 01</text><text x="258" y="313" class="heading">Signature</text><text x="258" y="343" class="body" text-anchor="start"><tspan x="258" dy="0">HMAC on raw body</tspan><tspan x="258" dy="28">timestamp tolerance</tspan><tspan x="258" dy="28">constant-time compare</tspan></text></g><g filter="url(#shadow)"><rect x="620" y="235" width="285" height="210" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="620" y="235" width="7" height="210" rx="4" fill="#2dd4bf"/><circle cx="654" cy="270" r="8" fill="#2dd4bf"/><text x="674" y="275" class="eyebrow" fill="#2dd4bf">GATE 02</text><text x="648" y="313" class="heading">Chat allow-list</text><text x="648" y="343" class="body" text-anchor="start"><tspan x="648" dy="0">explicit oc_ IDs</tspan><tspan x="648" dy="28">unknown groups ignored</tspan><tspan x="648" dy="28">audit event retained</tspan></text></g><g filter="url(#shadow)"><rect x="1010" y="235" width="285" height="210" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1010" y="235" width="7" height="210" rx="4" fill="#c084fc"/><circle cx="1044" cy="270" r="8" fill="#c084fc"/><text x="1064" y="275" class="eyebrow" fill="#c084fc">GATE 03</text><text x="1038" y="313" class="heading">Identity</text><text x="1038" y="343" class="body" text-anchor="start"><tspan x="1038" dy="0">allowed human owner</tspan><tspan x="1038" dy="28">or registered Agent</tspan><tspan x="1038" dy="28">never display-name match</tspan></text></g><g filter="url(#shadow)"><rect x="1370" y="250" width="190" height="180" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1370" y="250" width="7" height="180" rx="4" fill="#4ade80"/><circle cx="1404" cy="285" r="8" fill="#4ade80"/><text x="1424" y="290" class="eyebrow" fill="#4ade80">ALLOWED</text><text x="1398" y="328" class="heading">Workflow</text><text x="1398" y="358" class="body" text-anchor="start"><tspan x="1398" dy="0">bounded task</tspan><tspan x="1398" dy="28">explicit target</tspan></text></g><path d="M174 340 H230" class="line"/><path d="M515 340 H620" class="line-green"/><path d="M905 340 H1010" class="line-green"/><path d="M1295 340 H1370" class="line-green"/><g><rect x="530" y="302" width="76" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="530" y="302" width="76" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="568.0" y="323" class="pill" fill="#4ade80" text-anchor="middle">PASS</text></g><g><rect x="920" y="302" width="76" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="920" y="302" width="76" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="958.0" y="323" class="pill" fill="#4ade80" text-anchor="middle">PASS</text></g><g><rect x="1308" y="302" width="54" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="1308" y="302" width="54" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="1335.0" y="323" class="pill" fill="#4ade80" text-anchor="middle">PASS</text></g><path d="M372 445 V560" class="line-red"/><path d="M762 445 V560" class="line-red"/><path d="M1152 445 V560" class="line-red"/><rect x="242" y="560" width="260" height="92" rx="18" fill="#fb7185" opacity=".12" stroke="#fb7185" stroke-width="2"/><text x="372" y="596" class="eyebrow" fill="#fb7185" text-anchor="middle">REJECT · 401</text><text x="372" y="627" class="body" text-anchor="middle">No parsing or dispatch</text><rect x="632" y="560" width="260" height="92" rx="18" fill="#fbbf24" opacity=".12" stroke="#fbbf24" stroke-width="2"/><text x="762" y="596" class="eyebrow" fill="#fbbf24" text-anchor="middle">IGNORE + AUDIT</text><text x="762" y="627" class="body" text-anchor="middle">No workflow created</text><rect x="1022" y="560" width="260" height="92" rx="18" fill="#fb7185" opacity=".12" stroke="#fb7185" stroke-width="2"/><text x="1152" y="596" class="eyebrow" fill="#fb7185" text-anchor="middle">REJECT DISPATCH</text><text x="1152" y="627" class="body" text-anchor="middle">Identity not trusted</text><rect x="230" y="700" width="1330" height="72" rx="18" fill="#17243a" stroke="#2b3b55"/><circle cx="276" cy="736" r="10" fill="#4ade80"/><text x="304" y="730" class="eyebrow" fill="#4ade80">BOUNDARY GUARANTEE</text><text x="304" y="755" class="body">Only authenticated, allow-listed, identity-matched events can create Agent work.</text></svg>