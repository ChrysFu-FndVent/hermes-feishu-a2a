<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc"><title id="title">Task lifecycle</title><desc id="desc">Tasks move from pending to running, then succeed, fail after exhausted retries, or skip when a dependency fails.</desc><!-- Project documentation asset. --><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a8b5c7"/></marker><marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/></marker><style>.title{font:700 44px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.subtitle{font:400 22px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.eyebrow{font:700 16px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:1.8px}.heading{font:700 26px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.body{font:500 21px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.compact-body{font:500 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.small{font:600 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.pill{font:700 15px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.8px}.line{fill:none;stroke:#a8b5c7;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.line-green{fill:none;stroke:#4ade80;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-green)}.line-red{fill:none;stroke:#fb7185;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-red)}</style></defs><rect width="1400" height="760" rx="28" fill="#0b1220"/><path d="M0 190 H1400" stroke="#2b3b55" stroke-width="1" opacity=".6"/><text x="64" y="70" class="title">Task lifecycle</text><text x="64" y="106" class="subtitle">A small state machine with visible retries and explicit terminal outcomes.</text><g><rect x="64" y="136" width="120" height="30" rx="15" fill="#17243a" stroke="#60a5fa"/><rect x="64" y="136" width="120" height="30" rx="15" fill="#60a5fa" opacity=".12"/><text x="124.0" y="157" class="pill" fill="#60a5fa" text-anchor="middle">ACTIVE</text></g><g><rect x="196" y="136" width="128" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="196" y="136" width="128" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="260.0" y="157" class="pill" fill="#4ade80" text-anchor="middle">SUCCESS</text></g><g><rect x="336" y="136" width="122" height="30" rx="15" fill="#17243a" stroke="#fb7185"/><rect x="336" y="136" width="122" height="30" rx="15" fill="#fb7185" opacity=".12"/><text x="397.0" y="157" class="pill" fill="#fb7185" text-anchor="middle">FAILURE</text></g><g><rect x="470" y="136" width="124" height="30" rx="15" fill="#17243a" stroke="#fbbf24"/><rect x="470" y="136" width="124" height="30" rx="15" fill="#fbbf24" opacity=".12"/><text x="532.0" y="157" class="pill" fill="#fbbf24" text-anchor="middle">SKIPPED</text></g><g filter="url(#shadow)"><rect x="70" y="270" width="260" height="150" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="70" y="270" width="7" height="150" rx="4" fill="#60a5fa"/><circle cx="104" cy="305" r="8" fill="#60a5fa"/><text x="124" y="310" class="eyebrow" fill="#60a5fa">01 · PENDING</text><text x="98" y="348" class="heading">Await dispatch</text><text x="98" y="378" class="body" text-anchor="start"><tspan x="98" dy="0">dependencies checked</tspan><tspan x="98" dy="28">Agent selected</tspan></text></g><g filter="url(#shadow)"><rect x="550" y="270" width="260" height="150" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="550" y="270" width="7" height="150" rx="4" fill="#c084fc"/><circle cx="584" cy="305" r="8" fill="#c084fc"/><text x="604" y="310" class="eyebrow" fill="#c084fc">02 · RUNNING</text><text x="578" y="348" class="heading">Execute task</text><text x="578" y="378" class="body" text-anchor="start"><tspan x="578" dy="0">timeout active</tspan><tspan x="578" dy="28">attempt recorded</tspan></text></g><g filter="url(#shadow)"><rect x="1040" y="205" width="280" height="130" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1040" y="205" width="7" height="130" rx="4" fill="#4ade80"/><circle cx="1074" cy="240" r="8" fill="#4ade80"/><text x="1094" y="245" class="eyebrow" fill="#4ade80">03 · SUCCEEDED</text><text x="1068" y="283" class="heading">Result accepted</text><text x="1068" y="313" class="body" text-anchor="start"><tspan x="1068" dy="0">output + evidence stored</tspan></text></g><g filter="url(#shadow)"><rect x="1040" y="382" width="280" height="130" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1040" y="382" width="7" height="130" rx="4" fill="#fb7185"/><circle cx="1074" cy="417" r="8" fill="#fb7185"/><text x="1094" y="422" class="eyebrow" fill="#fb7185">03 · FAILED</text><text x="1068" y="460" class="heading">Retries exhausted</text><text x="1068" y="490" class="body" text-anchor="start"><tspan x="1068" dy="0">error + risk retained</tspan></text></g><g filter="url(#shadow)"><rect x="550" y="555" width="280" height="130" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="550" y="555" width="7" height="130" rx="4" fill="#fbbf24"/><circle cx="584" cy="590" r="8" fill="#fbbf24"/><text x="604" y="595" class="eyebrow" fill="#fbbf24">03 · SKIPPED</text><text x="578" y="633" class="heading">Dependency failed</text><text x="578" y="663" class="body" text-anchor="start"><tspan x="578" dy="0">no dispatch attempted</tspan></text></g><path d="M330 345 H550" class="line-green"/><g><rect x="360" y="315" width="156" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="360" y="315" width="156" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="438.0" y="336" class="pill" fill="#4ade80" text-anchor="middle">AGENT HEALTHY</text></g><path d="M810 330 C890 330 930 270 1040 270" class="line-green"/><g><rect x="846" y="254" width="154" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="846" y="254" width="154" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="923.0" y="275" class="pill" fill="#4ade80" text-anchor="middle">RESULT ACCEPTED</text></g><path d="M810 380 C900 380 930 447 1040 447" class="line-red"/><g><rect x="842" y="415" width="164" height="30" rx="15" fill="#17243a" stroke="#fb7185"/><rect x="842" y="415" width="164" height="30" rx="15" fill="#fb7185" opacity=".12"/><text x="924.0" y="436" class="pill" fill="#fb7185" text-anchor="middle">BUDGET EXHAUSTED</text></g><path d="M620 270 C620 205 780 205 780 270" class="line"/><g><rect x="636" y="205" width="130" height="30" rx="15" fill="#17243a" stroke="#c084fc"/><rect x="636" y="205" width="130" height="30" rx="15" fill="#c084fc" opacity=".12"/><text x="701.0" y="226" class="pill" fill="#c084fc" text-anchor="middle">RETRY + BACKOFF</text></g><path d="M200 420 V620 H550" class="line"/><g><rect x="236" y="590" width="184" height="30" rx="15" fill="#17243a" stroke="#fbbf24"/><rect x="236" y="590" width="184" height="30" rx="15" fill="#fbbf24" opacity=".12"/><text x="328.0" y="611" class="pill" fill="#fbbf24" text-anchor="middle">DEPENDENCY FAILED</text></g><text x="70" y="721" class="small">Every transition is persisted with timestamps, attempts, output, and error context.</text></svg>