<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Hermes Feishu A2A architecture</title><desc id="desc">A human request enters through Feishu, is coordinated by Hermes, dispatched to specialist Agents, verified, and returned as one final result.</desc><!-- Generated by scripts/render_readme_diagrams.py. --><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a8b5c7"/></marker><marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/></marker><style>.title{font:700 44px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.subtitle{font:400 22px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.eyebrow{font:700 16px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:1.8px}.heading{font:700 26px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f8fafc}.body{font:500 21px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.compact-body{font:500 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.small{font:600 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#a8b5c7}.pill{font:700 15px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.8px}.line{fill:none;stroke:#a8b5c7;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.line-green{fill:none;stroke:#4ade80;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-green)}.line-red{fill:none;stroke:#fb7185;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-red)}</style></defs><rect width="1600" height="900" rx="28" fill="#0b1220"/><path d="M0 190 H1600" stroke="#2b3b55" stroke-width="1" opacity=".6"/><text x="70" y="72" class="title">One request. A coordinated team. One accountable result.</text><text x="70" y="108" class="subtitle">Hermes owns the control loop; specialist Agents keep independent identities and runtimes.</text><g><rect x="70" y="136" width="166" height="30" rx="15" fill="#17243a" stroke="#2dd4bf"/><rect x="70" y="136" width="166" height="30" rx="15" fill="#2dd4bf" opacity=".12"/><text x="153.0" y="157" class="pill" fill="#2dd4bf" text-anchor="middle">FEISHU INGRESS</text></g><g><rect x="252" y="136" width="226" height="30" rx="15" fill="#17243a" stroke="#4ade80"/><rect x="252" y="136" width="226" height="30" rx="15" fill="#4ade80" opacity=".12"/><text x="365.0" y="157" class="pill" fill="#4ade80" text-anchor="middle">HERMES CONTROL PLANE</text></g><g><rect x="494" y="136" width="150" height="30" rx="15" fill="#17243a" stroke="#c084fc"/><rect x="494" y="136" width="150" height="30" rx="15" fill="#c084fc" opacity=".12"/><text x="569.0" y="157" class="pill" fill="#c084fc" text-anchor="middle">AGENT TEAM</text></g><g filter="url(#shadow)"><rect x="60" y="310" width="240" height="185" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="60" y="310" width="7" height="185" rx="4" fill="#2dd4bf"/><circle cx="94" cy="345" r="8" fill="#2dd4bf"/><text x="114" y="350" class="eyebrow" fill="#2dd4bf">01 · OWNER</text><text x="88" y="388" class="heading">Human request</text><text x="88" y="418" class="body" text-anchor="start"><tspan x="88" dy="0">Goal + constraints</tspan><tspan x="88" dy="28">posted in the group</tspan></text></g><g filter="url(#shadow)"><rect x="370" y="310" width="240" height="185" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="370" y="310" width="7" height="185" rx="4" fill="#60a5fa"/><circle cx="404" cy="345" r="8" fill="#60a5fa"/><text x="424" y="350" class="eyebrow" fill="#60a5fa">02 · TRUST</text><text x="398" y="388" class="heading">Feishu ingress</text><text x="398" y="418" class="body" text-anchor="start"><tspan x="398" dy="0">Signed event</tspan><tspan x="398" dy="28">chat + owner allow-list</tspan></text></g><g filter="url(#shadow)"><rect x="680" y="260" width="280" height="285" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="680" y="260" width="7" height="285" rx="4" fill="#4ade80"/><circle cx="714" cy="295" r="8" fill="#4ade80"/><text x="734" y="300" class="eyebrow" fill="#4ade80">03 · BRAIN</text><text x="708" y="338" class="heading">Hermes coordinator</text><text x="708" y="368" class="body" text-anchor="start"><tspan x="708" dy="0">Plan &amp; decompose</tspan><tspan x="708" dy="28">select healthy Agents</tspan><tspan x="708" dy="28">track deadlines</tspan><tspan x="708" dy="28">synthesize evidence</tspan></text></g><rect x="1025" y="218" width="500" height="410" rx="24" fill="#17243a" stroke="#2b3b55" stroke-width="2"/><text x="1060" y="260" class="eyebrow" fill="#c084fc">04 · SPECIALIST AGENT TEAM</text><g filter="url(#shadow)"><rect x="1060" y="286" width="205" height="106" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1060" y="286" width="7" height="106" rx="4" fill="#60a5fa"/><circle cx="1092" cy="315" r="8" fill="#60a5fa"/><text x="1112" y="321" class="eyebrow" fill="#60a5fa">CODEX</text><text x="1088" y="358" class="heading">Engineering</text><text x="1088" y="384" class="compact-body">implement · review</text></g><g filter="url(#shadow)"><rect x="1060" y="402" width="205" height="106" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1060" y="402" width="7" height="106" rx="4" fill="#fbbf24"/><circle cx="1092" cy="431" r="8" fill="#fbbf24"/><text x="1112" y="437" class="eyebrow" fill="#fbbf24">QODER</text><text x="1088" y="474" class="heading">Execution</text><text x="1088" y="500" class="compact-body">files · tests</text></g><g filter="url(#shadow)"><rect x="1060" y="518" width="205" height="106" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1060" y="518" width="7" height="106" rx="4" fill="#c084fc"/><circle cx="1092" cy="547" r="8" fill="#c084fc"/><text x="1112" y="553" class="eyebrow" fill="#c084fc">WORKBUDDY</text><text x="1088" y="590" class="heading">Support</text><text x="1088" y="616" class="compact-body">research · verify</text></g><g filter="url(#shadow)"><rect x="1300" y="358" width="190" height="170" rx="18" fill="#111c2e" stroke="#2b3b55" stroke-width="2"/><rect x="1300" y="358" width="7" height="170" rx="4" fill="#4ade80"/><circle cx="1334" cy="393" r="8" fill="#4ade80"/><text x="1354" y="398" class="eyebrow" fill="#4ade80">05 · GATE</text><text x="1328" y="436" class="heading">Verify results</text><text x="1328" y="466" class="body" text-anchor="start"><tspan x="1328" dy="0">evidence</tspan><tspan x="1328" dy="28">risk</tspan><tspan x="1328" dy="28">acceptance</tspan></text></g><path d="M300 402 H370" class="line"/><path d="M610 402 H680" class="line"/><path d="M960 402 H1020" class="line-green"/><path d="M1020 402 C1038 402 1038 339 1060 339" class="line"/><path d="M1020 402 C1038 402 1038 455 1060 455" class="line"/><path d="M1020 402 C1038 402 1038 571 1060 571" class="line"/><path d="M1265 339 C1286 339 1286 410 1300 410" class="line"/><path d="M1265 455 H1300" class="line"/><path d="M1265 571 C1286 571 1286 476 1300 476" class="line"/><rect x="370" y="690" width="1120" height="105" rx="22" fill="#111c2e" stroke="#4ade80" stroke-width="2"/><circle cx="420" cy="742" r="22" fill="#4ade80" opacity=".18"/><path d="M410 742 l8 8 15-18" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="460" y="733" class="eyebrow" fill="#4ade80">06 · ACCOUNTABLE DELIVERY</text><text x="460" y="766" class="heading">Hermes returns one traceable final result to the human owner.</text><path d="M1395 528 V675 C1395 684 1386 690 1374 690" class="line-green"/><path d="M370 742 H330 C315 742 288 706 288 682 V510" class="line-green"/><text x="1282" y="657" class="small">accepted evidence</text><text x="80" y="842" class="small">Identity is explicit · dispatch is bounded · progress is observable · delivery is coordinator-owned</text></svg>