# Copy to config/agents.yaml and replace every placeholder. Never commit secrets.
agents:
  - id: researcher
    display_name: Research Agent
    role: research and evidence gathering
    capabilities: [research, writing, analysis]
    transport: http
    endpoint: https://researcher.example.internal/agent
    permissions: [task:execute, result:write]

  - id: engineer
    display_name: Engineering Agent
    role: implementation and technical validation
    capabilities: [coding, debugging, review, build]
    transport: http
    endpoint: https://engineer.example.internal/agent
    permissions: [task:execute, result:write]

  - id: reviewer
    display_name: Review Agent
    role: independent review and acceptance checks
    capabilities: [review, testing, compliance]
    transport: feishu
    open_id: ou_replace_me
    permissions: [task:execute, result:write]
    metadata:
      chat_id: oc_replace_me
